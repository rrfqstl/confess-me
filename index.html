<!DOCTYPE html>
<html>

<head>
  <title>Anonymous Confession</title>
</head>

<body>

  <h1>Anonymous Confession</h1>

  <textarea
    id="message"
    placeholder="Tulis confession kamu..."
    rows="8"
    cols="40">
  </textarea>

  <br><br>

  <button onclick="sendConfession()">
    Kirim
  </button>

  <p id="status"></p>

  <script>
    async function sendConfession() {

      const message =
        document.getElementById("message").value;

      if (!message.trim()) {
        document.getElementById("status").innerText =
          "Tulis confession dulu";
        return;
      }

      try {

        const response = await fetch(
          "https://vrhqyymrzatfodtmmrnn.supabase.co/functions/v1/bright-function",
          {
            method: "POST",
            headers: {
  "Content-Type": "application/json",
  "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyaHF5eW1yemF0Zm9kdG1tcm5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDM3NjQsImV4cCI6MjA5NzAxOTc2NH0.a-RHRfd3km0ZCJP95xFQ97VjBmrvm2yNair9YAH07EQ",
  "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyaHF5eW1yemF0Zm9kdG1tcm5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDM3NjQsImV4cCI6MjA5NzAxOTc2NH0.a-RHRfd3km0ZCJP95xFQ97VjBmrvm2yNair9YAH07EQ"
}
            body: JSON.stringify({
              message: message
            })
          }
        );

        const data = await response.json();

        if (data.success) {

          document.getElementById("status").innerText =
            "Confession terkirim ✅";

          document.getElementById("message").value =
            "";

        } else {

          document.getElementById("status").innerText =
            "Gagal mengirim ❌";
        }

      } catch (error) {

        console.log(error);

        document.getElementById("status").innerText =
          "Terjadi error ❌";
      }
    }
  </script>

</body>

</html>
