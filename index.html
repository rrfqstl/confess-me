<!DOCTYPE html>
<html>

<head>
  <title>Anonymous Confession</title>
</head>

<body>

<h1>Anonymous Confession</h1>

<textarea
id="message"
placeholder="Tulis confession kamu..."
rows="8"
cols="40"></textarea>

<br><br>

<button onclick="sendConfession()">
Kirim
</button>

<p id="status"></p>

<script>

async function sendConfession() {

const message =
document.getElementById("message").value;

if (!message.trim()) {

document.getElementById("status").innerText =
"Tulis confession dulu";

return;

}

try {

const response = await fetch(

"https://vrhqyymrzatfodtmmrnn.supabase.co/functions/v1/bright-function",

{

method: "POST",

headers: {

"Content-Type": "application/json"

},

body: JSON.stringify({

message: message

})

}

);

const data = await response.json();

if (data.success) {

document.getElementById("status").innerText =
"Confession terkirim ✅";

document.getElementById("message").value =
"";

}

else {

document.getElementById("status").innerText =
"Gagal mengirim ❌";

console.log(data);

}

}

catch(error){

console.log(error);

document.getElementById("status").innerText =
"Terjadi error ❌";

}

}

</script>

</body>

</html>
