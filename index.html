<style>


*{

margin:0;

padding:0;

box-sizing:border-box;

}



body{


font-family:'Poppins',sans-serif;


background:#0b0b0b;


overflow:hidden;


color:white;


}





#intro{


position:fixed;


top:0;


left:0;


width:100%;


height:100%;


background:#0b0b0b;


display:flex;


justify-content:center;


align-items:center;


z-index:9999;


animation:

introFade 5s forwards;


animation-delay:3s;


}




.introText{


text-align:center;


}




.introText p{


font-size:30px;


opacity:0;


animation:

appear 2s forwards;


}




.introText h1{


font-size:42px;


margin-top:15px;


opacity:0;


animation:

appear 2s forwards;


animation-delay:1s;


}




@keyframes appear{


to{


opacity:1;


}


}




@keyframes introFade{


to{


opacity:0;


visibility:hidden;


}


}





#stars{


position:fixed;


top:-50vh;


left:-50vw;


width:200vw;


height:200vh;


z-index:-1;


overflow:hidden;


animation:

rotateSky 260s linear infinite;


transform-origin:center center;


}





.star{


position:absolute;


background:white;


border-radius:50%;


opacity:.8;


animation:

twinkle 3s infinite;


}





@keyframes twinkle{


50%{


opacity:.2;


}



100%{


opacity:1;


}


}




@keyframes rotateSky{


from{


transform:

rotate(0deg);


}



to{


transform:

rotate(360deg);


}


}




.shooting{


position:fixed;


top:-100px;


left:-100px;


width:5px;


height:5px;


background:white;


border-radius:50%;


box-shadow:


0 0 15px white,


0 0 35px white,


0 0 60px rgba(255,255,255,.7);


animation:


shoot 7s linear infinite;


}




@keyframes shoot{


0%{


transform:

translate(0,0);


opacity:1;


}



100%{


transform:


translate(1400px,900px);


opacity:0;


}


}




#main{


display:flex;


justify-content:center;


align-items:center;


height:100vh;


padding:20px;


}





.card{


width:100%;


max-width:470px;


padding:35px;


border-radius:35px;


background:


rgba(255,255,255,.04);


backdrop-filter:


blur(18px);


border:


1px solid rgba(255,255,255,.04);


box-shadow:


0 0 40px rgba(255,255,255,.05),


0 0 80px rgba(255,255,255,.03);


overflow:hidden;


text-align:center;


}




.photo-wrap{


width:250px;


padding:10px;


margin:auto;


border-radius:30px;


background:


rgba(255,255,255,.03);


animation:


profileGlow 6s ease-in-out infinite;


}




.profile{


width:100%;


height:330px;


object-fit:cover;


border-radius:22px;


display:block;


box-shadow:


0 0 25px rgba(255,255,255,.45),


0 0 50px rgba(255,255,255,.25),


0 0 90px rgba(255,255,255,.15);


cursor:pointer;


}




@keyframes profileGlow{


0%{


box-shadow:


0 0 25px rgba(255,255,255,.08),


0 0 60px rgba(255,255,255,.05);


}



50%{


box-shadow:


0 0 40px rgba(255,255,255,.15),


0 0 90px rgba(255,255,255,.10);


}



100%{


box-shadow:


0 0 25px rgba(255,255,255,.08),


0 0 60px rgba(255,255,255,.05);


}


}
.small{

margin-top:15px;

font-size:14px;

opacity:.8;

}


.archive{

font-size:13px;

opacity:.55;

margin-top:5px;

}



#greeting{

margin-top:18px;

font-size:13px;

opacity:.75;

line-height:1.6;

}




.musicCard{


margin-top:25px;


padding:18px;


border-radius:20px;


background:


rgba(255,255,255,.03);


backdrop-filter:


blur(10px);


}




.musicCard p{


font-size:15px;


font-weight:600;


}



.musicCard small{


opacity:.6;


display:block;


margin-top:5px;


}



#musicBtn{


margin-top:15px;


width:100%;


padding:14px;


border:none;


border-radius:16px;


background:


linear-gradient(90deg,#444,#666);


color:white;


cursor:pointer;


font-size:14px;


}




.note{


position:absolute;


right:20px;


font-size:18px;


opacity:0;


animation:


floatNote 4s infinite;


}



@keyframes floatNote{


0%{


transform:


translateY(0);


opacity:0;


}



50%{


opacity:1;


}



100%{


transform:


translateY(-60px);


opacity:0;


}


}




h1{


margin-top:30px;


font-size:28px;


}




textarea{


width:100%;


height:170px;


margin-top:20px;


padding:18px;


border:none;


outline:none;


resize:none;


border-radius:18px;


background:


#181818;


color:white;


font-size:15px;


font-family:'Poppins',sans-serif;


}




.info{


margin-top:20px;


padding:18px;


border-radius:18px;


background:


rgba(255,255,255,.03);


text-align:left;


font-size:14px;


line-height:1.8;


}




#btn{


margin-top:22px;


width:100%;


padding:15px;


border:none;


border-radius:18px;


cursor:pointer;


font-size:15px;


font-weight:600;


background:


linear-gradient(90deg,#4a4a4a,#707070);


color:white;


}



#status{


margin-top:18px;


font-size:14px;


}




#popup{


position:fixed;


top:0;


left:0;


width:100%;


height:100%;


display:none;


justify-content:center;


align-items:center;


background:


rgba(0,0,0,.75);


z-index:1000;


}




.popupBox{


padding:30px;


border-radius:25px;


background:


#1a1a1a;


text-align:center;


line-height:1.8;


}




#hearts{


position:fixed;


top:0;


left:0;


width:100%;


height:100%;


pointer-events:none;


}



@media(max-width:500px){


.card{


padding:25px;


}



.photo-wrap{


width:210px;


}



.profile{


height:290px;


}



}


</style>
