<style>


*{

margin:0;

padding:0;

box-sizing:border-box;

}



body{


font-family:'Poppins',sans-serif;


background:#0b0b0b;


overflow:hidden;


color:white;


}





#intro{


position:fixed;


top:0;


left:0;


width:100%;


height:100%;


background:#0b0b0b;


display:flex;


justify-content:center;


align-items:center;


z-index:9999;


animation:

introFade 5s forwards;


animation-delay:3s;


}




.introText{


text-align:center;


}




.introText p{


font-size:30px;


opacity:0;


animation:

appear 2s forwards;


}




.introText h1{


font-size:42px;


margin-top:15px;


opacity:0;


animation:

appear 2s forwards;


animation-delay:1s;


}




@keyframes appear{


to{


opacity:1;


}


}




@keyframes introFade{


to{


opacity:0;


visibility:hidden;


}


}





#stars{


position:fixed;


top:-50vh;


left:-50vw;


width:200vw;


height:200vh;


z-index:-1;


overflow:hidden;


animation:

rotateSky 260s linear infinite;


transform-origin:center center;


}





.star{


position:absolute;


background:white;


border-radius:50%;


opacity:.8;


animation:

twinkle 3s infinite;


}





@keyframes twinkle{


50%{


opacity:.2;


}



100%{


opacity:1;


}


}




@keyframes rotateSky{


from{


transform:

rotate(0deg);


}



to{


transform:

rotate(360deg);


}


}




.shooting{


position:fixed;


top:-100px;


left:-100px;


width:5px;


height:5px;


background:white;


border-radius:50%;


box-shadow:


0 0 15px white,


0 0 35px white,


0 0 60px rgba(255,255,255,.7);


animation:


shoot 7s linear infinite;


}




@keyframes shoot{


0%{


transform:

translate(0,0);


opacity:1;


}



100%{


transform:


translate(1400px,900px);


opacity:0;


}


}




#main{


display:flex;


justify-content:center;


align-items:center;


height:100vh;


padding:20px;


}





.card{


width:100%;


max-width:470px;


padding:35px;


border-radius:35px;


background:


rgba(255,255,255,.04);


backdrop-filter:


blur(18px);


border:


1px solid rgba(255,255,255,.04);


box-shadow:


0 0 40px rgba(255,255,255,.05),


0 0 80px rgba(255,255,255,.03);


overflow:hidden;


text-align:center;


}




.photo-wrap{


width:250px;


padding:10px;


margin:auto;


border-radius:30px;


background:


rgba(255,255,255,.03);


animation:


profileGlow 6s ease-in-out infinite;


}




.profile{


width:100%;


height:330px;


object-fit:cover;


border-radius:22px;


display:block;


box-shadow:


0 0 25px rgba(255,255,255,.45),


0 0 50px rgba(255,255,255,.25),


0 0 90px rgba(255,255,255,.15);


cursor:pointer;


}




@keyframes profileGlow{


0%{


box-shadow:


0 0 25px rgba(255,255,255,.08),


0 0 60px rgba(255,255,255,.05);


}



50%{


box-shadow:


0 0 40px rgba(255,255,255,.15),


0 0 90px rgba(255,255,255,.10);


}



100%{


box-shadow:


0 0 25px rgba(255,255,255,.08),


0 0 60px rgba(255,255,255,.05);


}


}
.small{

margin-top:15px;

font-size:14px;

opacity:.8;

}


.archive{

font-size:13px;

opacity:.55;

margin-top:5px;

}



#greeting{

margin-top:18px;

font-size:13px;

opacity:.75;

line-height:1.6;

.musicCard{


margin-top:25px;


padding:18px;


border-radius:20px;


background:


rgba(255,255,255,.03);


backdrop-filter:


blur(10px);

.musicCard p{


font-size:15px;


font-weight:600;


}



.musicCard small{


opacity:.6;


display:block;


margin-top:5px;


}



#musicBtn{


margin-top:15px;


width:100%;


padding:14px;


border:none;


border-radius:16px;


background:


linear-gradient(90deg,#444,#666);


color:white;


cursor:pointer;


font-size:14px;


}




.note{


position:absolute;


right:20px;


font-size:18px;


opacity:0;


animation:


floatNote 4s infinite;


}



@keyframes floatNote{


0%{


transform:


translateY(0);


opacity:0;


}



50%{


opacity:1;


}



100%{


transform:


translateY(-60px);


opacity:0;


}


}




h1{


margin-top:30px;


font-size:28px;


}




textarea{


width:100%;


height:170px;


margin-top:20px;


padding:18px;


border:none;


outline:none;


resize:none;


border-radius:18px;


background:


#181818;


color:white;

}




.info{


margin-top:20px;


padding:18px;


border-radius:18px;


background:


rgba(255,255,255,.03);


text-align:left;


font-size:14px;


line-height:1.8;


}




#btn{


margin-top:22px;


width:100%;


padding:15px;


border:none;


border-radius:18px;


cursor:pointer;


font-size:15px;


font-weight:600;


background:


linear-gradient(90deg,#4a4a4a,#707070);


color:white;


}



#status{


margin-top:18px;


font-size:14px;


}




#popup{


position:fixed;


top:0;


left:0;


width:100%;


height:100%;


display:none;


justify-content:center;


align-items:center;


background:


rgba(0,0,0,.75);


z-index:1000;


}




.popupBox{


padding:30px;


border-radius:25px;


background:


#1a1a1a;


text-align:center;


line-height:1.8;


}




#hearts{


position:fixed;


top:0;


left:0;


width:100%;


height:100%;


pointer-events:none;


}



@media(max-width:500px){


.card{


padding:25px;


}



.photo-wrap{


width:210px;


}



.profile{


height:290px;


}



}


</style>

</head>

<script>
const status = document.getElementById("status");



// ======================
// Greeting
// ======================

const greeting =
document.getElementById("greeting");

const hour =
new Date().getHours();

if(hour < 12){

greeting.innerHTML=
"good morning,<br>stay safe and smile😊🫶";

}

else if(hour < 18){

greeting.innerHTML=
"have a wonderful day✨";

}

else{

greeting.innerHTML=
"good evening,<br>stay safe and smile😊🫶";

}





// ======================
// 220 stars
// ======================

const stars =
document.getElementById("stars");


for(let i=0;i<220;i++){


let star =
document.createElement("div");


star.className =
"star";


star.style.left=
Math.random()*100+"%";


star.style.top=
Math.random()*100+"%";


let size =
Math.random()*3+1;


star.style.width=
size+"px";


star.style.height=
size+"px";


star.style.animationDelay=
Math.random()*4+"s";


stars.appendChild(star);


}




// ======================
// Music
// ======================

const audio =
document.getElementById("audio");


const musicBtn =
document.getElementById("musicBtn");



function toggleMusic(){


if(audio.paused){


audio.play();


musicBtn.innerHTML=
"⏸ Pause Music";


}


else{


audio.pause();


musicBtn.innerHTML=
"▶ Play Music";


}


}





// ======================
// Double Tap Easter Egg
// ======================


let tap=0;


document.getElementById("profile")

.addEventListener(

"click",

()=>{


tap++;



if(tap===2){



document.getElementById("popup")

.style.display="flex";



setTimeout(()=>{


document.getElementById("popup")

.style.display="none";


},2200);



tap=0;



}



}


);





// ======================
// Floating Hearts
// ======================


function createHeart(){


let heart=

document.createElement("div");


heart.innerHTML="❤️";


heart.style.position="fixed";


heart.style.left=

Math.random()*100+"%";


heart.style.bottom="-20px";


heart.style.fontSize="20px";


heart.style.transition="4s";


document.body.appendChild(

heart

);



setTimeout(()=>{


heart.style.bottom="100%";


heart.style.opacity="0";


},100);



setTimeout(()=>{


heart.remove();


},4000);


}

// Send Confession
// ======================


async function sendConfession(){



const msg=


document.getElementById(

"message"

).value;

"Isi confession terlebih dahulu";

const btn=


document.getElementById(

"btn"

);

"⏳ Mengirim...";





try{



const response=


await fetch(

"https://vrhqyymrzatfodtmmrnn.supabase.co/functions/v1/bright-function",

{


method:"POST",



headers:{


"Content-Type":"application/json",


"apikey":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyaHF5eW1yemF0Zm9kdG1tcm5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDM3NjQsImV4cCI6MjA5NzAxOTc2NH0.a-RHRfd3km0ZCJP95xFQ97VjBmrvm2yNair9YAH07EQ",


"Authorization":

"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyaHF5eW1yemF0Zm9kdG1tcm5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDM3NjQsImV4cCI6MjA5NzAxOTc2NH0.a-RHRfd3km0ZCJP95xFQ97VjBmrvm2yNair9YAH07EQ"



},



body:


JSON.stringify({


message:msg


})


}



);





const data=


await response.json();




if(data.success){



status.innerHTML=


"💌 Confession berhasil terkirim";



document.getElementById(

"message"

).value="";



for(let i=0;i<15;i++){



setTimeout(()=>{


createHeart();


},i*180);



}

else{



status.innerHTML=


"❌ Gagal mengirim";

catch(err){

  }
</script>
