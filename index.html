<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Our Little Universe</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:#0d0d0d;

overflow:hidden;

color:white;

}




#intro{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#0d0d0d;

display:flex;

justify-content:center;

align-items:center;

z-index:9999;

animation:

fadeOut 5s forwards;

animation-delay:3s;

}




.introText{

text-align:center;

}



.introText p{

font-size:25px;

opacity:0;

animation:

appear 2s forwards;

}



.introText h1{

margin-top:20px;

font-size:40px;

opacity:0;

animation:

appear 2s forwards;

animation-delay:1s;

}





@keyframes appear{

to{

opacity:1;

}

}



@keyframes fadeOut{

to{

opacity:0;

visibility:hidden;

}

}





#stars{

position:fixed;

top:-50vh;

left:-50vw;

width:200vw;

height:200vh;

overflow:hidden;

z-index:-1;


animation:

rotateSky 260s linear infinite;


transform-origin:center center;

}




.star{


position:absolute;


background:white;


border-radius:50%;


opacity:.8;


animation:

twinkle 3s infinite;


will-change:transform;


}


@keyframes twinkle{


50%{

opacity:.2;

}



100%{

opacity:1;

}


}

@keyframes rotateSky{

from{

transform:rotate(0deg);

}

to{

transform:rotate(360deg);

}

}

@keyframes profileGlow{

0%{

box-shadow:

0 0 15px rgba(255,255,255,.12),

0 0 35px rgba(255,255,255,.08);

}


50%{

box-shadow:

0 0 25px rgba(255,255,255,.22),

0 0 60px rgba(255,255,255,.16),

0 0 90px rgba(255,255,255,.10);

}


100%{

box-shadow:

0 0 15px rgba(255,255,255,.12),

0 0 35px rgba(255,255,255,.08);

}

}



.shooting{

position:fixed;

top:-100px;
left:-100px;

width:5px;
height:5px;

background:white;

border-radius:50%;

box-shadow:

0 0 10px white,

0 0 25px white,

0 0 50px rgba(255,255,255,.8);

animation:
shoot 7s linear infinite;

}



@keyframes shoot{


0%{

transform:

translate(0,0);

opacity:1;

}



100%{


transform:

translate(1200px,700px);


opacity:0;


}



}





#main{


display:flex;


justify-content:center;


align-items:center;


height:100vh;


}




.card{


width:90%;

max-width:420px;


padding:25px;


border-radius:30px;


background:


rgba(255,255,255,.04);



backdrop-filter:

blur(15px);



text-align:center;



box-shadow:


0 0 30px


rgba(255,255,255,.05);



}





.profile{

width:220px;
height:300px;

object-fit:contain;

border-radius:25px;

cursor:pointer;

box-shadow:


0 0 15px rgba(255,255,255,.15),

0 0 35px rgba(255,255,255,.12),

0 0 60px rgba(255,255,255,.10),

0 0 90px rgba(255,255,255,.07);


animation:

profileGlow 6s ease-in-out infinite;
}




.small{


margin-top:15px;


opacity:.8;



}




.archive{


opacity:.6;


margin-top:5px;


font-size:13px;



}





#greeting{


margin-top:15px;


font-size:13px;


opacity:.7;



}





.musicCard{


margin-top:20px;


padding:15px;


border-radius:20px;



background:


rgba(255,255,255,.03);



}




.musicCard small{


opacity:.6;



}




.musicCard button{


margin-top:15px;



width:100%;



padding:12px;



border:none;



border-radius:15px;



background:


linear-gradient(90deg,#3b3b3b,#595959);



color:white;



cursor:pointer;



}





h1{


margin-top:30px;



font-size:28px;



}




textarea{


margin-top:20px;



width:100%;



height:170px;



padding:15px;



border:none;



outline:none;



resize:none;



border-radius:18px;



background:#1c1c1c;



color:white;



font-size:15px;



}




.info{


margin-top:20px;



padding:15px;



border-radius:18px;



background:


rgba(255,255,255,.03);



text-align:left;



line-height:1.6;



font-size:14px;



}





#btn{


margin-top:20px;



width:100%;



padding:15px;



border:none;



border-radius:18px;



font-size:16px;



cursor:pointer;



background:


linear-gradient(90deg,#444,#666);



color:white;



}





#status{


margin-top:20px;



font-size:14px;



}





#popup{


position:fixed;


top:0;


left:0;



width:100%;


height:100%;



display:none;



justify-content:center;



align-items:center;



background:


rgba(0,0,0,.7);



}





.popupBox{


padding:30px;



border-radius:20px;



background:


#202020;



text-align:center;



}




#hearts{


position:fixed;



top:0;



left:0;



width:100%;



height:100%;



pointer-events:none;



}




@media(max-width:500px){


.profile{


width:180px;


height:260px;


}



h1{


font-size:24px;


}



}

</style>

</head>


<body>


<!-- OPENING -->

<div id="intro">

<div class="introText">

<p>everything</p>

<p>made by</p>

<h1>100% love😉🫶</h1>

</div>

</div>




<!-- STARS -->

<div id="stars"></div>




<!-- SHOOTING STAR -->

<div class="shooting"></div>





<!-- MAIN -->

<div id="main">



<div class="card">



<img

id="profile"

src="IMG_20230521_193718_408.webp"

class="profile"

>





<p class="small">

made with 100% love🫶

</p>



<p class="archive">

forever archived ✨

</p>



<p id="greeting">

</p>





<div class="musicCard">


<p>

🎵 Our Little Universe

</p>



<small>

Stuck With U

Acoustic Violin Cover

</small>



<button

id="musicBtn"

onclick="toggleMusic()"

>

▶ Play Music

</button>



</div>





<audio

id="audio"

src="Ariana Grande Justin Bieber - Stuck With U - Acoustic Cover (Violin).mp3"

>

</audio>






<h1>

💌 Anonymous Confession

</h1>






<textarea

id="message"

placeholder="Tulis sesuatu yang ingin kamu sampaikan..."

>

</textarea>







<div class="info">



🛡️

<b>

Pesanmu aman

</b>



<br>

<br>



pesanmu akan tersampaikan

100%

kepada yang membuat ini,

pasti aman aja😉🫶



</div>






<button

id="btn"

onclick="sendConfession()"

>

✈️ Kirim Confession

</button>






<p id="status">

</p>






<div id="hearts">

</div>






</div>





</div>





<div id="popup">


<div class="popupBox">


Some memories deserve

to stay forever.


<br>

<br>


🫶✨



</div>


</div>






<script>


const SUPABASE_URL =
"https://vrhqyymrzatfodtmmrnn.supabase.co/functions/v1/bright-function";

const APIKEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyaHF5eW1yemF0Zm9kdG1tcm5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDM3NjQsImV4cCI6MjA5NzAxOTc2NH0.a-RHRfd3km0ZCJP95xFQ97VjBmrvm2yNair9YAH07EQ";



// ===== GREETING =====

const hour = new Date().getHours();

const greet =
document.getElementById("greeting");


if(hour>=0 && hour<6){

greet.innerHTML=
"good night,<br>thanks for visiting our little universe 🌌";

}

else if(hour<18){

greet.innerHTML=
"have a wonderful day ✨";

}

else{

greet.innerHTML=
"good evening,<br>stay safe and smile😉🫶";

}




// ===== STARS =====

const stars =
document.getElementById("stars");


for(let i=0;i<220;i++){


let s=
document.createElement("div");


s.className=
"star";


s.style.left=
Math.random()*100+"%";


s.style.top=
Math.random()*100+"%";


let size=
Math.random()*3+1;


s.style.width=
size+"px";


s.style.height=
size+"px";


s.style.animationDelay=
Math.random()*5+"s";


stars.appendChild(s);


}





// ===== MUSIC =====

const audio=
document.getElementById("audio");


const musicBtn=
document.getElementById("musicBtn");


function toggleMusic(){


if(audio.paused){


audio.play();


musicBtn.innerHTML=
"⏸ Pause Music";


}


else{


audio.pause();


musicBtn.innerHTML=
"▶ Play Music";


}



}





// ===== EASTER EGG =====


let tap=0;


const profile=
document.getElementById("profile");


profile.addEventListener("click",()=>{


tap++;



if(tap==2){


document.getElementById("popup")
.style.display="flex";


setTimeout(()=>{


document.getElementById("popup")
.style.display="none";


},2000);



tap=0;



}


});






// ===== HEARTS =====

function createHeart(){


let heart=
document.createElement("div");


heart.innerHTML=
"❤️";


heart.style.position=
"fixed";


heart.style.left=
Math.random()*100+"%";


heart.style.bottom=
"0";


heart.style.fontSize=
"20px";


heart.style.transition=
"4s";


document.body.appendChild(heart);



setTimeout(()=>{


heart.style.bottom=
"100%";


heart.style.opacity=
"0";


},50);



setTimeout(()=>{


heart.remove();


},4000);



}







// ===== CONFESSION =====


async function sendConfession(){



const msg=


document.getElementById("message").value;



if(!msg.trim()){


status.innerHTML=


"Isi confession terlebih dahulu";


return;


}




const btn=


document.getElementById("btn");



btn.disabled=true;



btn.innerHTML=


"⏳ Mengirim...";





try{


const response=


await fetch(


SUPABASE_URL,


{


method:"POST",



headers:{



"Content-Type":"application/json",



"apikey":APIKEY,



"Authorization":"Bearer "+APIKEY



},



body:JSON.stringify({



message:msg



})



}



);




const data=


await response.json();





if(data.success){



status.innerHTML=


"💌 Confession berhasil terkirim";



document.getElementById("message")
.value="";



for(let i=0;i<15;i++){



setTimeout(()=>{


createHeart();


},i*150);



}



}



else{


status.innerHTML=


"❌ Gagal mengirim";


}





}




catch(err){


status.innerHTML=


"❌ Terjadi error";


console.log(err);


}




btn.disabled=false;


btn.innerHTML=


"✈️ Kirim Confession";


}


</script>



</body>

</html>
